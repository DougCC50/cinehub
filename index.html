<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineHub Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <script src="js/app-pwa.js" defer></script>

    <style>
        /* Estilos dos novos filtros visíveis e abertos (Inspirados no JustWatch) */
        .filter-section {
            margin-bottom: 25px;
            text-align: left;
        }

        .filter-title {
            font-size: 14px;
            font-weight: 700;
            color: #999c9f;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* Botão Filtro Base (Estilo Capsula/Ghost) */
        .btn-filter {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid #383d47;
            color: #d2d3d5;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            user-select: none;
        }

        .btn-filter:hover {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: #5c6374;
            color: #fff;
        }

        /* Estado Selecionado/Ativo */
        .btn-filter.selected {
            background-color: #fbc500; /* Amarelo de destaque */
            border-color: #fbc500;
            color: #000;
            font-weight: 700;
        }

        /* Pequeno ajuste no painel de busca para acomodar o novo layout */
        .search-panel {
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-row {
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

<div class="background"></div>

<header>
    <h1>CineHub Premium</h1>
    <p>Seu Portal Particular de Streaming</p>
</header>

<section class="platforms">
    <a href="https://www.netflix.com/browse" target="_blank" class="platform netflix">
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/netflix.svg" alt="Netflix">
        <span>Netflix</span>
    </a>
    <a href="https://www.disneyplus.com/pt-br/home" target="_blank" class="platform disney">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" alt="Disney+">
        <span>Disney+</span>
    </a>
    <a href="https://play.max.com/" target="_blank" class="platform max">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Max_logo.svg" alt="Max">
        <span>Max</span>
    </a>
    <a href="https://tv.apple.com/br" target="_blank" class="platform apple">
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/apple.svg" alt="Apple TV+">
        <span>Apple TV+</span>
    </a>
</section>

<section id="hero">
    <div class="hero-overlay">
        <h2 id="heroTitulo">Bem-vindo ao CineHub</h2>
        <p id="heroTexto">Descubra filmes e séries incríveis.</p>
    </div>
</section>

<section class="search-panel">
    <h2>
        <i class="fa-solid fa-magnifying-glass"></i>
        Descobrir
    </h2>
    
    <div class="search-row">
        <input id="txtPesquisa" type="text" placeholder="Pesquisar por título específico...">
    </div>
    
    <div class="filter-section">
        <div class="filter-title"><i class="fa-solid fa-layer-group"></i> Plataformas</div>
        <div class="filter-options-grid" id="filterPlataformas">
            <button class="btn-filter" data-value="nfx">Netflix</button>
            <button class="btn-filter" data-value="dnp">Disney+</button>
            <button class="btn-filter" data-value="mxx">Max</button>
            <button class="btn-filter" data-value="atp">Apple TV+</button>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-title"><i class="fa-solid fa-film"></i> Gêneros</div>
        <div class="filter-options-grid" id="filterGeneros">
            <button class="btn-filter" data-value="ani">Animação</button>
            <button class="btn-filter" data-value="cmy">Comédia</button>
            <button class="btn-filter" data-value="crm">Crime</button>
            <button class="btn-filter" data-value="doc">Documentário</button>
            <button class="btn-filter" data-value="drm">Drama</button>
            <button class="btn-filter" data-value="eur">Europeu</button>
            <button class="btn-filter" data-value="fml">Família</button>
            <button class="btn-filter" data-value="fnt">Fantasia</button>
            <button class="btn-filter" data-value="hrr">Terror</button>
            <button class="btn-filter" data-value="hst">História</button>
            <button class="btn-filter" data-value="msc">Música & Musical</button>
            <button class="btn-filter" data-value="rly">Reality TV</button>
            <button class="btn-filter" data-value="rma">Romance</option>
            <button class="btn-filter" data-value="scf">Ficção Científica</button>
            <button class="btn-filter" data-value="spt">Esporte & Fitness</button>
            <button class="btn-filter" data-value="trl">Mistério & Thriller</button>
            <button class="btn-filter" data-value="war">Guerra</button>
            <button class="btn-filter" data-value="wsn">Western</button>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-title"><i class="fa-solid fa-calendar-days"></i> Ano Limite</div>
        <div class="filter-options-grid" id="filterAnos">
            <button class="btn-filter" data-value="2026">Até 2026</button>
            <button class="btn-filter" data-value="2025">Até 2025</button>
            <button class="btn-filter" data-value="2024">Até 2024</button>
            <button class="btn-filter" data-value="2023">Até 2023</button>
            <button class="btn-filter" data-value="2022">Até 2022</button>
            <button class="btn-filter" data-value="2020">Até 2020</button>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-title"><i class="fa-solid fa-tv"></i> Tipo de Conteúdo</div>
        <div class="filter-options-grid" id="filterTipo">
            <button class="btn-filter selected" data-value="todos">Filmes e Séries</button>
            <button class="btn-filter" data-value="filmes">Filmes</button>
            <button class="btn-filter" data-value="series">Séries</button>
        </div>
    </div>

    <div class="buttons" style="margin-top: 30px;">
        <button id="btnPesquisar">
            <i class="fa-solid fa-magnifying-glass"></i>
            Descobrir no JustWatch
        </button>
        <button id="btnSorteio">
            🎲 Me surpreenda
        </button>
    </div>
</section>

<footer>
    CineHub Premium • JustWatch Dynamic Engine
</footer>

<script>
    // Gerenciador de cliques para alternar as classes de seleção (.selected)
    configurarSeletoresMultiplos('filterPlataformas');
    configurarSeletoresMultiplos('filterGeneros');
    configurarSeletoresMultiplos('filterAnos'); // Permite trocar o teto do ano se quiser alternar
    configurarSeletorUnico('filterTipo');

    document.getElementById('btnPesquisar').addEventListener('click', executarBusca);
    document.getElementById('txtPesquisa').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') executarBusca();
    });

    document.getElementById('btnSorteio').addEventListener('click', function() {
        // Limpa seleções de gêneros atuais
        const botoesGens = document.querySelectorAll('#filterGeneros .btn-filter');
        botoesGens.forEach(btn => btn.classList.remove('selected'));
        
        // Escolhe um gênero aleatório e o ativa
        const randomBtn = botoesGens[Math.floor(Math.random() * botoesGens.length)];
        randomBtn.classList.add('selected');
        
        executarBusca();
    });

    // Função para permitir selecionar múltiplos botões em um grupo
    function configurarSeletoresMultiplos(containerId) {
        const container = document.getElementById(containerId);
        container.addEventListener('click', function(e) {
            if (e.target.classList.contains('btn-filter')) {
                // Se for o grupo de anos, idealmente queremos apenas um ano limite por vez
                if (containerId === 'filterAnos') {
                    container.querySelectorAll('.btn-filter').forEach(b => {
                        if (b !== e.target) b.classList.remove('selected');
                    });
                }
                e.target.classList.toggle('selected');
            }
        });
    }

    // Função para permitir apenas um botão ativo (Tipo de conteúdo)
    function configurarSeletorUnico(containerId) {
        const container = document.getElementById(containerId);
        container.addEventListener('click', function(e) {
            if (e.target.classList.contains('btn-filter')) {
                container.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
            }
        });
    }

    // Pega os valores de todos os botões que estão com a classe '.selected'
    function getValoresAtivos(containerId) {
        const selecionados = document.querySelectorAll(`#${containerId} .btn-filter.selected`);
        return Array.from(selecionados).map(btn => btn.getAttribute('data-value'));
    }

    function executarBusca() {
        const termo = document.getElementById('txtPesquisa').value.trim();
        const plataformasSelecionadas = getValoresAtivos('filterPlataformas');
        const generosSelecionados = getValoresAtivos('filterGeneros');
        const anosSelecionados = getValoresAtivos('filterAnos');
        const tipoSelecionado = getValoresAtivos('filterTipo')[0] || 'todos';

        // Se houver texto digitado, faz a busca padrão por string de texto
        if (termo) {
            window.open(`https://www.justwatch.com/br/busca?q=${encodeURIComponent(termo)}`, '_blank');
            return;
        }

        let urlBase = "https://www.justwatch.com/br";
        let pathTipo = "";
        
        if (tipoSelecionado === 'filmes') pathTipo = "/filmes";
        if (tipoSelecionado === 'series') pathTipo = "/series";
        if (tipoSelecionado === 'todos' && plataformasSelecionadas.length !== 1) pathTipo = "/filmes";

        let urlFinal = urlBase + pathTipo;
        const params = [];

        // Lógica inteligente de rotas do JustWatch descoberta por você:
        if (plataformasSelecionadas.length === 1) {
            const p = plataformasSelecionadas[0];
            let providerPath = "";
            if (p === 'nfx') providerPath = "netflix";
            if (p === 'dnp') providerPath = "disney-plus";
            if (p === 'mxx') providerPath = "hbo-max";
            if (p === 'atp') providerPath = "apple-tv-plus";

            urlFinal = `${urlBase}/provedor/${providerPath}${pathTipo}`;
        } else if (plataformasSelecionadas.length > 1) {
            params.push(`providers=${plataformasSelecionadas.join(',')}`);
        }

        if (generosSelecionados.length > 0) {
            params.push(`genres=${generosSelecionados.join(',')}`);
        }

        if (anosSelecionados.length > 0) {
            params.push(`release_year_until=${anosSelecionados[0]}`); // Pega o primeiro ano limite ativo
        }

        if (params.length > 0) {
            urlFinal += `?${params.join('&')}`;
        }

        window.open(urlFinal, '_blank');
    }
</script>

</body>
</html>
